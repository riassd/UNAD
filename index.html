<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Tarjetas de Reconocimiento · Sinergy Soluciones Integrales</title>
<style>
  /* ============================================================
     PALETA CORPORATIVA SINERGY
     Azul    #004581   ·  Naranja #F28C00
     Blanco  #FFFFFF   ·  Gris     #666666
     ============================================================ */
  :root {
    --azul:      #004581;
    --azul-osc:  #003666;
    --naranja:   #F28C00;
    --blanco:    #FFFFFF;
    --gris:      #666666;
    --gris-txt:  #4a4f55;
    --gris-claro:#eef1f5;

    /* Logos reales del repositorio (misma carpeta que este HTML) */
    --logo-blanco: "450x150px-bh.png";   /* versión blanca, para la banda azul */

    /* Ajusta cuántas tarjetas quieres por hoja:
       2 columnas x 4 filas = 8 tarjetas
       2 columnas x 5 filas = 10 tarjetas (reduce --card-h a ~50mm) */
    --cols: 2;
    --card-h: 64mm;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--gris-claro);
    color: var(--gris);
    -webkit-print-color-adjust: exact;   /* colores/degradados al imprimir */
    print-color-adjust: exact;
  }

  /* ============================================================
     BARRA DE HERRAMIENTAS (solo pantalla)
     ============================================================ */
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    background: linear-gradient(90deg, var(--azul-osc), var(--azul));
    color: var(--blanco);
    padding: 13px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  .toolbar .brand { display: flex; align-items: center; gap: 12px; }
  .toolbar .brand img { height: 30px; width: auto; }
  .toolbar h1 { font-size: 16px; font-weight: 600; letter-spacing: .3px; }
  .toolbar h1 span { color: var(--naranja); }
  .toolbar .spacer { flex: 1; }
  .toolbar .hint { font-size: 12.5px; opacity: .85; }
  .toolbar .hint kbd {
    background: rgba(255,255,255,.18); border-radius: 0;
    padding: 2px 6px; font-family: inherit;
  }

  .btn {
    border: none; font-size: 14px; font-weight: 600;
    padding: 10px 18px; border-radius: 0; cursor: pointer;
    transition: transform .1s ease, filter .15s ease;
    text-decoration: none; display: inline-flex; align-items: center; gap: 7px;
  }
  .btn:hover { filter: brightness(1.06); }
  .btn:active { transform: scale(.97); }
  .btn-print { background: var(--naranja); color: var(--blanco); }
  .btn-csv   { background: var(--blanco);  color: var(--azul); }
  .btn-ghost { background: rgba(255,255,255,.14); color: var(--blanco); }
  #csvInput { display: none; }

  /* Interruptor (toggle) para mostrar/ocultar el nombre */
  .toggle { display: inline-flex; align-items: center; gap: 8px;
    color: var(--blanco); font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; }
  .toggle input { display: none; }
  .toggle .via {
    position: relative; width: 40px; height: 22px; border-radius: 0;
    background: rgba(255,255,255,.28); transition: background .2s ease;
  }
  .toggle .via::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; border-radius: 0; background: var(--blanco);
    transition: transform .2s ease;
  }
  .toggle input:checked + .via { background: var(--naranja); }
  .toggle input:checked + .via::after { transform: translateX(18px); }

  .meta { text-align: center; font-size: 13px; color: var(--gris); padding: 12px 16px 0; }
  .meta b { color: var(--azul); }

  /* ============================================================
     GRID DE TARJETAS (pantalla)
     ============================================================ */
  .page { max-width: 920px; margin: 16px auto 44px; padding: 0 16px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(var(--cols), 1fr);
    gap: 10mm;
  }

  /* ============================================================
     TARJETA — diseño premium tipo flashcard corporativa
     ============================================================ */
  .card {
    position: relative;
    background: var(--blanco);
    border-radius: 0;
    box-shadow: 0 6px 20px rgba(0,69,129,.10);
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: var(--card-h);
  }

  /* -- Banda superior azul con el logo blanco -- */
  .card .encabezado {
    position: relative;
    background: linear-gradient(115deg, var(--azul-osc) 0%, var(--azul) 60%, #0a5aa0 100%);
    padding: 12px 18px;
    display: flex; align-items: center; justify-content: space-between;
    overflow: hidden;
  }
  /* Gota/acento naranja translúcido dentro de la banda */
  .card .encabezado::after {
    content: ""; position: absolute; right: -26px; top: -26px;
    width: 90px; height: 90px; border-radius: 50%;
    background: var(--naranja); opacity: .22;
  }
  .card .encabezado img.logo {
    height: 26px; width: auto; position: relative; z-index: 1;
  }
  .card .encabezado .sello {
    position: relative; z-index: 1;
    color: var(--blanco); font-size: 10px; font-weight: 700;
    letter-spacing: 1.6px; text-transform: uppercase;
    border: 1px solid rgba(255,255,255,.45);
    padding: 4px 9px; border-radius: 0;
    white-space: nowrap;
  }

  /* -- Cuerpo -- */
  .card .cuerpo {
    flex: 1; display: flex; flex-direction: column;
    padding: 14px 20px 8px; text-align: center;
  }

  .card .categoria {
    align-self: center;
    background: rgba(242,140,0,.12);
    color: var(--naranja);
    font-size: 11.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.1px;
    padding: 5px 14px; border-radius: 0;
    margin-bottom: 8px;
  }
  .card .categoria::before { content: "★ "; }

  .card .para { 
    font-size: 9.5px; color: var(--gris); letter-spacing: 1px;
    text-transform: uppercase; opacity: .75; margin-bottom: 1px; 
  }
  
  .card .linea-firma {
    border-bottom: 1px solid var(--gris);
    width: 65%;
    margin: 16px auto 10px auto;
  }

  .card .nombre {
    color: var(--azul); font-size: 19px; font-weight: 800; line-height: 1.15;
    margin-bottom: 8px;
  }
  .card .nombre:empty { display: none; }
  
  /* Con el toggle apagado se oculta el nombre escrito y se muestra la línea obligatoriamente */
  body.sin-nombre .card .nombre { display: none; }
  body.sin-nombre .card .linea-firma { display: block !important; }

  /* Con el toggle apagado se oculta el chip de categoría */
  body.sin-categoria .card .categoria { display: none; }
  /* Con el toggle apagado se oculta el pie (firma Sinergy) */
  body.sin-pie .card .pie { display: none; }

  .card .texto {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative;
    color: var(--gris-txt); font-size: 18px; line-height: 1.4; font-weight: 600;
    padding: 4px 8px 6px;
  }
  /* Comillas decorativas en naranja (apertura y cierre) */
  .card .texto::before,
  .card .texto::after {
    position: absolute; font-family: Georgia, "Times New Roman", serif;
    font-size: 34px; color: var(--naranja); opacity: .35; line-height: 1;
  }
  .card .texto::before { content: "\201C"; left: 2px;  top: -6px; }
  .card .texto::after  { content: "\201D"; right: 2px; bottom: -14px; }

  /* -- Pie -- */
  .card .pie {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 18px 14px;
    border-top: 1px solid #eef1f5; margin: 0 16px;
    font-size: 10.5px; color: var(--gris);
  }
  .card .pie .punto { width: 6px; height: 6px; border-radius: 0; background: var(--naranja); }
  .card .pie b { color: var(--azul); }

  /* Barra inferior de acento */
  .card .franja {
    height: 6px;
    background: linear-gradient(90deg, var(--azul) 0%, var(--azul) 55%, var(--naranja) 55%, var(--naranja) 100%);
  }

  /* ============================================================
     IMPRESIÓN  →  Ctrl + P
     ============================================================ */
  @media print {
    @page { size: A4; margin: 9mm; }   /* cambia "A4" por "letter" si usas Carta */

    body { background: var(--blanco); }
    .toolbar, .meta { display: none !important; }
    .page { max-width: none; margin: 0; padding: 0; }
    .grid { gap: 6mm; }

    .card {
      break-inside: avoid; page-break-inside: avoid;   /* no cortar tarjetas */
      box-shadow: none;
      border: 1px solid #d7dde3;
      min-height: var(--card-h);
    }
  }
</style>
</head>
<body>

  <!-- BARRA SUPERIOR (no se imprime) -->
  <div class="toolbar">
    <div class="brand">
      <img src="450x150px-bh.png" alt="Sinergy" onerror="this.style.display='none'">
      <h1>Reconocimientos <span>Sinergy</span></h1>
    </div>
    <div class="spacer"></div>

    <label class="toggle" title="Mostrar u ocultar el nombre y la categoría">
      <input type="checkbox" id="toggleDatos" checked onchange="toggleDatos(this)">
      <span class="via"></span>
      <span>Mostrar nombre y categoría</span>
    </label>

    <label class="toggle" title="Mostrar u ocultar el pie (Sinergy · Soluciones Integrales)">
      <input type="checkbox" id="togglePie" checked onchange="togglePie(this)">
      <span class="via"></span>
      <span>Mostrar pie</span>
    </label>

    <label class="btn btn-csv" for="csvInput">📄 Cargar CSV</label>
    <input type="file" id="csvInput" accept=".csv,text/csv" onchange="cargarCSV(event)">
    <button class="btn btn-ghost" onclick="descargarPlantilla()">⬇️ Plantilla CSV</button>

    <span class="hint"><kbd>Ctrl</kbd>+<kbd>P</kbd> → PDF</span>
    <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir / PDF</button>
  </div>

  <p class="meta">
    Tarjetas generadas: <b id="contador">0</b> ·
    <span id="fuente">Mostrando ejemplos. Carga tu CSV para generar todas.</span>
  </p>

  <div class="page">
    <div class="grid" id="grid"></div>
  </div>

<script>
  /* ============================================================
     LOGOS (archivos reales del repositorio, junto a este HTML)
       · Banda azul  → versión blanca:  450x150px-bh.png
     ============================================================ */
  const LOGO_BLANCO = "450x150px-bh.png";

  /* ============================================================
     DATOS DE EJEMPLO (se muestran hasta cargar un CSV)
       Cada objeto = una tarjeta:  { nombre, categoria, texto }
     ============================================================ */
  let reconocimientos = [
    { nombre: "María López", categoria: "Trabajo en Equipo", texto: "Eres un gran compañero, siempre dispuesto a ayudar" },
    { nombre: "Carlos Ruiz", categoria: "Actitud Positiva",  texto: "Tu energía contagia al equipo" },
    { nombre: "Ana Torres",  categoria: "Compromiso",        texto: "Siempre das la milla extra" },
  ];

  /* ============================================================
     UTILIDADES
     ============================================================ */
  function escapeHTML(str) {
    return String(str == null ? "" : str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  /* Parser CSV robusto: detecta separador (, o ;), respeta comillas,
     comillas escapadas (""), saltos de línea internos y BOM inicial. */
  function parseCSV(text) {
    text = text.replace(/^﻿/, "");
    const primeraLinea = text.split(/\r?\n/)[0] || "";
    const comas = (primeraLinea.match(/,/g) || []).length;
    const pyc   = (primeraLinea.match(/;/g) || []).length;
    const DELIM = pyc > comas ? ";" : ",";

    const filas = []; let campo = "", fila = [], comillas = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (comillas) {
        if (c === '"') { if (text[i+1] === '"') { campo += '"'; i++; } else comillas = false; }
        else campo += c;
      } else {
        if (c === '"') comillas = true;
        else if (c === DELIM) { fila.push(campo); campo = ""; }
        else if (c === "\n") { fila.push(campo); filas.push(fila); fila = []; campo = ""; }
        else if (c === "\r") { /* ignora */ }
        else campo += c;
      }
    }
    if (campo.length > 0 || fila.length > 0) { fila.push(campo); filas.push(fila); }
    return filas.filter(f => f.some(v => String(v).trim() !== ""));
  }

  /* Mapea encabezados flexibles (con/sin acento y sinónimos) a nuestras claves. */
  function indiceEncabezados(cabecera) {
    const norm = s => String(s).trim().toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const idx = { nombre: -1, categoria: -1, texto: -1 };
    cabecera.forEach((h, i) => {
      const k = norm(h);
      if (idx.nombre    < 0 && ["nombre","nombres","colaborador","empleado","name"].includes(k)) idx.nombre = i;
      if (idx.categoria < 0 && ["categoria","category","tipo","valor"].includes(k)) idx.categoria = i;
      if (idx.texto     < 0 && ["texto","frase","mensaje","reconocimiento","message","descripcion"].includes(k)) idx.texto = i;
    });
    return idx;
  }

  /* ============================================================
     CARGA DE CSV
     ============================================================ */
  function cargarCSV(evento) {
    const archivo = evento.target.files && evento.target.files[0];
    if (!archivo) return;
    const lector = new FileReader();
    lector.onload = function (e) {
      try {
        const filas = parseCSV(e.target.result);
        if (filas.length === 0) throw new Error("El archivo está vacío.");

        const idx = indiceEncabezados(filas[0]);
        let inicio = 1;
        if (idx.nombre < 0 && idx.categoria < 0 && idx.texto < 0) {
          // Sin encabezado reconocido: deducir por número de columnas
          const cols = filas[0].length;
          if (cols <= 1)      { idx.texto = 0; }                       // solo frases
          else if (cols === 2){ idx.categoria = 0; idx.texto = 1; }    // categoría + frase
          else                { idx.nombre = 0; idx.categoria = 1; idx.texto = 2; }
          inicio = 0;   // no había encabezado: usar también la primera fila
        }

        const datos = [];
        for (let i = inicio; i < filas.length; i++) {
          const f = filas[i];
          const nombre    = idx.nombre    >= 0 ? (f[idx.nombre]    || "").trim() : "";
          const categoria = idx.categoria >= 0 ? (f[idx.categoria] || "").trim() : "";
          const texto     = idx.texto     >= 0 ? (f[idx.texto]     || "").trim() : "";
          if (!nombre && !categoria && !texto) continue;
          datos.push({ nombre, categoria, texto });
        }
        if (datos.length === 0) throw new Error("No se encontraron filas con datos.");

        reconocimientos = datos;
        render();
        document.getElementById("fuente").innerHTML =
          'CSV cargado: <b>' + escapeHTML(archivo.name) + '</b> · una tarjeta por fila. Presiona <b>Ctrl+P</b>.';
      } catch (err) {
        alert("No se pudo leer el CSV:\n" + err.message +
              "\n\nFormato esperado (con encabezado):\nnombre,categoria,texto");
      }
    };
    lector.readAsText(archivo, "UTF-8");
    evento.target.value = "";
  }

  /* ============================================================
     PLANTILLA CSV DE EJEMPLO
     ============================================================ */
  function descargarPlantilla() {
    const contenido =
      "nombre,categoria,texto\r\n" +
      'María López,Trabajo en Equipo,"Eres un gran compañero, siempre dispuesto a ayudar"\r\n' +
      "Carlos Ruiz,Actitud Positiva,Tu energía contagia al equipo\r\n" +
      "Ana Torres,Compromiso,Siempre das la milla extra\r\n";
    const blob = new Blob(["\uFEFF" + contenido], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "plantilla_reconocimientos.csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /* ============================================================
     TOGGLE: mostrar / ocultar el nombre en todas las tarjetas
     ============================================================ */
  /* Un solo toggle controla nombre + categoría a la vez */
  function toggleDatos(input) {
    document.body.classList.toggle("sin-nombre", !input.checked);
    document.body.classList.toggle("sin-categoria", !input.checked);
  }
  /* Toggle del pie (firma Sinergy · Soluciones Integrales) */
  function togglePie(input) {
    document.body.classList.toggle("sin-pie", !input.checked);
  }

  /* ============================================================
     RENDERIZADO DE LAS TARJETAS
     ============================================================ */
  function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = reconocimientos.map(function (r) {
      
      // Creamos el bloque del nombre evaluando si hay datos o si debe ir la línea obligatoria.
      let bloqueNombre = '<div class="para">Reconocimiento para</div>';
      if (r.nombre) {
        bloqueNombre += '<div class="nombre">' + escapeHTML(r.nombre) + '</div>';
        bloqueNombre += '<div class="linea-firma" style="display:none;"></div>';
      } else {
        bloqueNombre += '<div class="linea-firma"></div>';
      }

      return (
        '<div class="card">' +
          '<div class="encabezado">' +
            '<img class="logo" src="' + LOGO_BLANCO + '" alt="Sinergy" onerror="this.style.display=\'none\'">' +
            '<span class="sello">Reconocimiento</span>' +
          '</div>' +
          '<div class="cuerpo">' +
            (r.categoria ? '<div class="categoria">' + escapeHTML(r.categoria) + '</div>' : '') +
            bloqueNombre +
            '<div class="texto">' + escapeHTML(r.texto) + '</div>' +
          '</div>' +
          '<div class="pie">' +
            '<span class="punto"></span>' +
            'Sinergy · <b>Soluciones Integrales</b>' +
            '<span class="punto"></span>' +
          '</div>' +
          '<div class="franja"></div>' +
        '</div>'
      );
    }).join("");
    document.getElementById("contador").textContent = reconocimientos.length;
  }

  render();
</script>
</body>
</html>
